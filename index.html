<!DOCTYPE html>
<html>
<head>
  <title>Submit</title>
  <style>
    body {
      background-color: #f5f0e6;
      font-family: Georgia, serif;
      max-width: 600px;
      margin: 80px auto;
      color: #3e3a34;
    }

    h1 {
      text-align: center;
    }

    textarea, input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #aaa;
      background: #fffdf8;
      font-family: inherit;
    }

    textarea {
      height: 150px;
      resize: none;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #7a8f6a;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #5f7353;
    }
  </style>
</head>
<body>

  <h1>Leave a Message</h1>

  <form action="https://formspree.io/f/mgodwpdb" method="POST">
    
    <!-- First box (normal text) -->
    <textarea name="message" placeholder="Write your message..."></textarea>

    <!-- Second box (hidden input) -->
    <input type="password" name="secret" placeholder="Enter code...">

    <button type="submit">Submit</button>
  </form>

</body>
</html>
