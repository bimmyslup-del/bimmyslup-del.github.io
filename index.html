<!DOCTYPE html>
<html>
<head>
  <title>Submit</title>
  <style>
    body {
      background-color: #f5f0e6;
      font-family: Georgia, serif;
      max-width: 600px;
      margin: 80px auto;
      color: #3e3a34;
    }

    h1 {
      text-align: center;
    }

    textarea {
      width: 100px;
      height: 50px;
      padding: 10px;
      border: 1px solid #aaa;
      background: #fffdf8;
      font-family: inherit;
      resize: none;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #7a8f6a;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #5f7353;
    }
  </style>
</head>
<body>

  <h1>Leave a Message</h1>

  <form action="https://formspree.io/f/mgodwpdb" method="POST">
    <textarea name="message" placeholder="Write here..."></textarea>
    <br>
    <button type="submit">Submit</button>
  </form>

</body>
</html>
